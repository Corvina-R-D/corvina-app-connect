<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Mocha Tests</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/mocha/mocha.css" />
</head>

<body>
  <div id="mocha"></div>
  <iframe src="" id="corvina-app-connect-app" title="sample-app-iframe"></iframe>

  <script src="https://unpkg.com/chai/chai.js"></script>
  <script src="https://unpkg.com/mocha/mocha.js"></script>

  <script class="mocha-init">
    mocha.setup('bdd');
    mocha.checkLeaks();
  </script>
  <script type="module">
    import { CorvinaHost, CorvinaConnect } from '/dist/index.min.mjs';
    let { assert } = chai;
    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function createAppUrl({ origin, corvinaHost }) {
      const preventCache = Math.random();
      return `${origin}/samples/commonjs/iframe.html?corvinaHost=${encodeURIComponent(corvinaHost)}&preventCache=${preventCache}`;
    }

    it('I can create an instance of CorvinaHost', async function () {
      let host = await CorvinaHost.create({
        jwt: 'xxx',
        corvinaHost: window.location.origin,
        organizationId: "1",
      })

      assert.isDefined(host);

      host.dispose();
    });

    it('I can set jwt and organizationId in CorvinaHost', async function () {
      let host = await CorvinaHost.create({
        jwt: 'xxx',
        corvinaHost: window.location.origin,
        organizationId: "1",
      })

      assert.isDefined(host);

      host.jwt = 'new jwt';
      host.organizationId = 'new organizationId';

      assert.equal(host.jwt, 'new jwt');
      assert.equal(host.organizationId, 'new organizationId');

      host.dispose();
    });

    it('If I set jwt in CorvinaHost, then CorvinaConnect will receive that jwt', async function () {
      this.slow(400);

      let hostConfiguration = {
        jwt: 'xxx',
        corvinaHost: window.location.origin,
        organizationId: "1",
      };
      const newJwt = 'new jwt';

      let host = await CorvinaHost.create(hostConfiguration)

      const appUrl = createAppUrl({ origin: window.location.origin, corvinaHost: hostConfiguration.corvinaHost });

      document.querySelector("#corvina-app-connect-app").src = appUrl;

      await sleep(200) // time to load the iframe      

      host.jwt = newJwt;

      await sleep(50) // I need to wait because there is a postMessage round trip between host and connect

      let connect = document.getElementById("corvina-app-connect-app").contentWindow.connect
      assert.equal(connect.jwt, newJwt);

      host.dispose();
      document.querySelector("#corvina-app-connect-app").src = "";
    });

    it('If I set organizationId in CorvinaHost, then CorvinaConnect will receive that organizationId', async function () {
      this.slow(400);

      let hostConfiguration = {
        jwt: 'xxx',
        corvinaHost: window.location.origin,
        organizationId: "1",
      };
      const newOrgId = 'new org id';

      let host = await CorvinaHost.create(hostConfiguration)

      const appUrl = createAppUrl({ origin: window.location.origin, corvinaHost: hostConfiguration.corvinaHost });

      document.querySelector("#corvina-app-connect-app").src = appUrl;

      await sleep(200) // time to load the iframe      

      host.organizationId = newOrgId;

      await sleep(50) // I need to wait because there is a postMessage round trip between host and connect

      let connect = document.getElementById("corvina-app-connect-app").contentWindow.connect
      assert.equal(connect.organizationId, newOrgId);

      host.dispose();
      document.querySelector("#corvina-app-connect-app").src = "";
    });

    it('If I set theme in CorvinaHost, then CorvinaConnect will receive that theme', async function () {
      this.slow(400);

      let hostConfiguration = {
        jwt: 'xxx',
        corvinaHost: window.location.origin,
        organizationId: "1",
        theme: {
          colors: {
            wt: 'red',
            g1: 'blue',
            g2: 'green',
            g3: 'yellow',
            g4: 'pink',
            dk: 'black',
            primary: 'purple',
            primaryDk1: 'purple',
            primaryDk2: 'purple',
            highlight: 'purple',
            alert: 'purple',
            warningSerious: 'purple',
            warningMild: 'purple',
            good: 'green',
          },
        }
      };

      let host = await CorvinaHost.create(hostConfiguration)

      let iframe = document.querySelector("#corvina-app-connect-app");
      let waitIframeLoad = () => new Promise((resolve, reject) => {
        iframe.onload = resolve;
        iframe.onerror = reject;

        const appUrl = createAppUrl({ origin: window.location.origin, corvinaHost: hostConfiguration.corvinaHost });

        iframe.src = appUrl;
      });

      await waitIframeLoad();

      await sleep(200) // time to load the iframe

      let connect = document.getElementById("corvina-app-connect-app").contentWindow.connect

      assert.equal(JSON.stringify(connect.theme), JSON.stringify(hostConfiguration.theme));

      const newTheme = { colors: { ...hostConfiguration.theme.colors, primary: 'blue' } };
      host.theme = newTheme;

      await sleep(50) // I need to wait because there is a postMessage round trip between host and connect

      assert.equal(JSON.stringify(connect.theme), JSON.stringify(newTheme));

      host.dispose();
      document.querySelector("#corvina-app-connect-app").src = "";
    });

    it('CorvinaConnect is a singleton', async function () {
      const host = await CorvinaHost.create({
        jwt: 'xxx',
        corvinaHost: window.location.origin,
        organizationId: "1",
      })
      let connect1 = await CorvinaConnect.create({
        corvinaHost: window.location.origin,
        corvinaHostWindow: window
      })
      let connect2 = await CorvinaConnect.create({
        corvinaHost: window.location.origin,
        corvinaHostWindow: window
      })

      assert.isDefined(connect1);
      assert.isDefined(connect2);
      assert.equal(connect1, connect2);

      connect1.dispose();
      connect2.dispose();
      host.dispose();
    });

    it('I can trigger a navigation from CorvinaConnect to CorvinaHost', async function () {
      this.slow(400);
      let pathNavigatedTo = null;
      const hostConfiguration = {
        jwt: 'xxx',
        corvinaHost: window.location.origin,
        organizationId: "1",
      }
      const host = await CorvinaHost.create(hostConfiguration)
      host.onNavigate(data => {
        pathNavigatedTo = data.page;
      })

      const appUrl = createAppUrl({ origin: window.location.origin, corvinaHost: hostConfiguration.corvinaHost });

      document.querySelector("#corvina-app-connect-app").src = appUrl;

      await sleep(200) // time to load the iframe      

      let connect = document.getElementById("corvina-app-connect-app").contentWindow.connect

      assert.isDefined(connect);

      connect.navigateTo('/test');

      await sleep(50);

      assert.equal(pathNavigatedTo, '/test');

      host.dispose();
      document.querySelector("#corvina-app-connect-app").src = "";
    })

    mocha.run((failures) => {
      if (failures) {
        console.error('Tests failed');
      } else {
        console.log('Tests passed');
      }
    });
  </script>

</body>

</html>
