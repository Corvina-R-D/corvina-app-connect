<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Sample</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <script src='https://unpkg.com/@corvina/corvina-app-connect@1.0.0/dist/index.umd.min.js'></script>
</head>

<body>

    <script>
        (async () => {

            try {
                let corvinaHost = window.location.search.split('corvinaHost=')[1];

                let connect = await $corvina.CorvinaConnect.create({ corvinaHost: decodeURIComponent(corvinaHost), corvinaHostWindow: window.parent });

                window.connect = connect
            } catch (error) {
                console.error(error);
            }
        })()
    </script>
</body>

</html>
