<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Sample</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <script src='/dist/index.umd.min.js'></script>
</head>

<body>

    <script>
        (async () => {

            try {
                let corvinaHost = new URL(window.location.href).searchParams.get('corvinaHost');

                if (!corvinaHost) {
                    throw new Error("corvinaHost parameter is missing from the URL");
                }

                let connect = await $corvina.CorvinaConnect.create({ corvinaHost: decodeURIComponent(corvinaHost), corvinaHostWindow: window.parent });

                window.connect = connect;
            } catch (error) {
                console.error(error);
            }
        })()
    </script>
</body>

</html>
