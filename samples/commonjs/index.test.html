<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Mocha Tests</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/mocha/mocha.css" />
</head>

<body>
  <div id="mocha"></div>

  <script src='./js/index.js'></script>
  <script src="https://unpkg.com/chai/chai.js"></script>
  <script src="https://unpkg.com/mocha/mocha.js"></script>

  <script class="mocha-init">
    mocha.setup('bdd');
    mocha.checkLeaks();
  </script>
  <script>
    let { assert } = chai;
    let { CorvinaHost, CorvinaConnect } = $corvina;
    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    it('I can create an instance of CorvinaHost', async function () {
      let host = await CorvinaHost.create({
        jwt: 'xxx',
        corvinaHost: window.location.origin,
        organizationId: "1",
      })

      assert.isDefined(host);

      host.dispose();
    });

    it('I can set jwt and organizationId in CorvinaHost', async function () {
      let host = await CorvinaHost.create({
        jwt: 'xxx',
        corvinaHost: window.location.origin,
        organizationId: "1",
      })

      assert.isDefined(host);

      host.jwt = 'new jwt';
      host.organizationId = 'new organizationId';

      assert.equal(host.jwt, 'new jwt');
      assert.equal(host.organizationId, 'new organizationId');

      host.dispose();
    });

    it('If I set jwt in CorvinaHost, then CorvinaConnect will receive that jwt', async function () {
      let hostConfiguration = {
        jwt: 'xxx',
        corvinaHost: window.location.origin,
        organizationId: "1",
      };
      const newJwt = 'new jwt';
      let onChangedJwt;

      let host = await CorvinaHost.create(hostConfiguration)

      let connect = await CorvinaConnect.create({ corvinaHost: hostConfiguration.corvinaHost });

      connect.on('JWT_CHANGED', (jwt) => {
        onChangedJwt = jwt;
      });

      assert.equal(connect.jwt, hostConfiguration.jwt);
      assert.equal(connect.corvinaHost, hostConfiguration.corvinaHost);
      assert.equal(connect.organizationId, hostConfiguration.organizationId);

      host.jwt = newJwt;

      await sleep(10) // I need to wait because there is a postMessage round trip between host and connect

      assert.equal(connect.jwt, newJwt);
      assert.equal(onChangedJwt, newJwt);

      host.dispose();
      CorvinaConnect.dispose();
    });

    it('If I set organizationId in CorvinaHost, then CorvinaConnect will receive that organizationId', async function () {
      let hostConfiguration = {
        jwt: 'aaa',
        corvinaHost: window.location.origin,
        organizationId: "-1",
      };
      const newOrgId = 'new org id';
      let onChangedOrgId;

      let host = await CorvinaHost.create(hostConfiguration)

      let connect = await CorvinaConnect.create({ corvinaHost: hostConfiguration.corvinaHost });

      connect.on('ORGANIZATION_ID_CHANGED', (organizationId) => {
        onChangedOrgId = organizationId;
      });

      assert.equal(connect.jwt, hostConfiguration.jwt);
      assert.equal(connect.corvinaHost, hostConfiguration.corvinaHost);
      assert.equal(connect.organizationId, hostConfiguration.organizationId);

      host.organizationId = newOrgId;

      await sleep(10) // I need to wait because there is a postMessage round trip between host and connect

      assert.equal(connect.organizationId, newOrgId);
      assert.equal(onChangedOrgId, newOrgId);

      host.dispose();
      CorvinaConnect.dispose();
    });

    it('CorvinaConnect is a singleton', async function () {
      let host = await CorvinaHost.create({
        jwt: 'xxx',
        corvinaHost: window.location.origin,
        organizationId: "1",
      })
      let connect1 = await CorvinaConnect.create({
        corvinaHost: window.location.origin,
      })
      let connect2 = await CorvinaConnect.create({
        corvinaHost: window.location.origin,
      })

      assert.isDefined(connect1);
      assert.isDefined(connect2);
      assert.equal(connect1, connect2);

      connect1.dispose();
      connect2.dispose();
    });
  </script>
  <script class="mocha-exec">
    mocha.run((failures) => {
      if (failures) {
        console.error('Tests failed');
      } else {
        console.log('Tests passed');
      }
    });
  </script>
</body>

</html>
